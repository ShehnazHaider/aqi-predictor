name: Daily Feature Engineering and Model Training

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  preprocess_and_train:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Run preprocessing
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python data_preprocessing.py

      - name: 📈 Train Linear Regression
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python Linear_regression.py

      - name: 🌲 Train Random Forest
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python random_forest.py

      - name: ⚡ Train XGBoost
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python XGBoost.py

      - name: 📊 Train Gradient Boosting
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python gradient_boost.py

      - name: 🧠 Train Prophet
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python prophet_model.py

      - name: 🏆 Compare models & select best
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: python compare_models.py